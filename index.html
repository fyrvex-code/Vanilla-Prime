<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vanilla Prime — Приватный Minecraft-сервер</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* =============================================
   RESET & BASE
   ============================================= */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --black:        #080C08;
  --deep:         #0D140D;
  --surface:      #111811;
  --glass-bg:     rgba(20, 32, 20, 0.55);
  --glass-border: rgba(102, 187, 106, 0.12);
  --green-dark:   #2E7D32;
  --green:        #388E3C;
  --green-light:  #66BB6A;
  --green-glow:   rgba(102, 187, 106, 0.18);
  --white:        #FFFFFF;
  --off-white:    #E8F5E9;
  --muted:        #90A490;
  --text:         #D8EDD8;
  --radius-sm:    10px;
  --radius-md:    18px;
  --radius-lg:    28px;
  --transition:   0.35s cubic-bezier(0.4, 0, 0.2, 1);
}

html { scroll-behavior: smooth; }

body {
  font-family: 'Inter', sans-serif;
  background: var(--black);
  color: var(--text);
  overflow-x: hidden;
  line-height: 1.65;
}

::selection { background: var(--green-dark); color: var(--white); }

/* =============================================
   SCROLLBAR
   ============================================= */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--black); }
::-webkit-scrollbar-thumb { background: var(--green-dark); border-radius: 3px; }

/* =============================================
   NOISE OVERLAY (texture)
   ============================================= */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 9999;
  opacity: 0.4;
}

/* =============================================
   NAVBAR
   ============================================= */
#navbar {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 1000;
  padding: 0 2rem;
  height: 68px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: rgba(8, 12, 8, 0);
  backdrop-filter: blur(0px);
  border-bottom: 1px solid transparent;
  transition: background var(--transition), backdrop-filter var(--transition), border-color var(--transition);
}

#navbar.scrolled {
  background: rgba(8, 12, 8, 0.85);
  backdrop-filter: blur(24px) saturate(1.4);
  border-color: var(--glass-border);
}

.nav-logo {
  font-family: 'Cinzel', serif;
  font-weight: 700;
  font-size: 1.25rem;
  color: var(--white);
  text-decoration: none;
  letter-spacing: 0.04em;
  display: flex;
  align-items: center;
  gap: 0.45rem;
}
.nav-logo span { color: var(--green-light); }

.nav-links {
  display: flex;
  gap: 0.25rem;
  list-style: none;
}
.nav-links a {
  color: var(--muted);
  text-decoration: none;
  font-size: 0.875rem;
  font-weight: 500;
  padding: 0.4rem 0.75rem;
  border-radius: var(--radius-sm);
  transition: color var(--transition), background var(--transition);
}
.nav-links a:hover { color: var(--green-light); background: var(--green-glow); }

.nav-cta {
  display: flex;
  gap: 0.5rem;
  align-items: center;
}

.hamburger {
  display: none;
  flex-direction: column;
  gap: 5px;
  cursor: pointer;
  padding: 4px;
  background: none;
  border: none;
}
.hamburger span {
  display: block;
  width: 22px; height: 2px;
  background: var(--off-white);
  border-radius: 2px;
  transition: transform var(--transition), opacity var(--transition);
}

.mobile-menu {
  display: none;
  position: fixed;
  inset: 68px 0 0 0;
  background: rgba(8, 12, 8, 0.97);
  backdrop-filter: blur(24px);
  z-index: 999;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 0.5rem;
  padding: 2rem;
}
.mobile-menu.open { display: flex; }
.mobile-menu a {
  color: var(--text);
  text-decoration: none;
  font-size: 1.2rem;
  font-weight: 500;
  padding: 0.75rem 2rem;
  width: 100%;
  text-align: center;
  border-radius: var(--radius-md);
  transition: background var(--transition), color var(--transition);
}
.mobile-menu a:hover { background: var(--green-glow); color: var(--green-light); }

/* =============================================
   BUTTONS
   ============================================= */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.65rem 1.4rem;
  border-radius: var(--radius-sm);
  font-family: 'Inter', sans-serif;
  font-size: 0.875rem;
  font-weight: 600;
  cursor: pointer;
  border: none;
  text-decoration: none;
  transition: transform var(--transition), box-shadow var(--transition), background var(--transition), opacity var(--transition);
  white-space: nowrap;
  position: relative;
  overflow: hidden;
}
.btn::after {
  content: '';
  position: absolute;
  inset: 0;
  background: rgba(255,255,255,0);
  transition: background var(--transition);
}
.btn:hover::after { background: rgba(255,255,255,0.06); }
.btn:hover { transform: translateY(-2px); }
.btn:active { transform: translateY(0); }

.btn-primary {
  background: linear-gradient(135deg, var(--green-dark) 0%, var(--green) 100%);
  color: var(--white);
  box-shadow: 0 4px 24px rgba(46, 125, 50, 0.35);
}
.btn-primary:hover {
  box-shadow: 0 8px 36px rgba(46, 125, 50, 0.55);
}

.btn-outline {
  background: transparent;
  color: var(--green-light);
  border: 1.5px solid rgba(102, 187, 106, 0.35);
  backdrop-filter: blur(8px);
}
.btn-outline:hover {
  background: var(--green-glow);
  border-color: var(--green-light);
}

.btn-ghost {
  background: rgba(255,255,255,0.05);
  color: var(--text);
  border: 1.5px solid rgba(255,255,255,0.08);
}
.btn-ghost:hover {
  background: rgba(255,255,255,0.09);
  color: var(--white);
}

.btn-sm { padding: 0.45rem 1rem; font-size: 0.8rem; }
.btn-lg { padding: 0.85rem 1.9rem; font-size: 1rem; }

/* =============================================
   HERO
   ============================================= */
#hero {
  position: relative;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  overflow: hidden;
  padding: 6rem 2rem 4rem;
}

/* Minecraft pixel-art panorama background */
.hero-canvas {
  position: absolute;
  inset: 0;
  z-index: 0;
}

.hero-canvas svg {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* Gradient overlay */
#hero::after {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 50% 40%, rgba(46,125,50,0.12) 0%, transparent 70%),
    linear-gradient(to bottom, rgba(8,12,8,0.45) 0%, rgba(8,12,8,0.25) 40%, rgba(8,12,8,0.7) 80%, var(--black) 100%);
  z-index: 1;
}

.hero-content {
  position: relative;
  z-index: 2;
  max-width: 760px;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  background: rgba(46, 125, 50, 0.15);
  border: 1px solid rgba(102, 187, 106, 0.25);
  border-radius: 50px;
  padding: 0.35rem 1rem;
  font-size: 0.78rem;
  font-weight: 600;
  color: var(--green-light);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 1.5rem;
  backdrop-filter: blur(10px);
  animation: fadeDown 0.8s ease both;
}
.hero-badge-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--green-light);
  box-shadow: 0 0 8px var(--green-light);
  animation: pulse 2s ease-in-out infinite;
}

.hero-logo {
  font-family: 'Cinzel', serif;
  font-weight: 900;
  font-size: clamp(3rem, 9vw, 6.5rem);
  line-height: 1;
  letter-spacing: -0.01em;
  color: var(--white);
  margin-bottom: 0.2rem;
  animation: fadeUp 0.9s 0.1s ease both;
  text-shadow: 0 0 80px rgba(102,187,106,0.25), 0 2px 40px rgba(0,0,0,0.5);
}
.hero-logo em {
  font-style: normal;
  background: linear-gradient(135deg, #66BB6A 0%, #A5D6A7 50%, #66BB6A 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.hero-icon {
  font-size: clamp(2.5rem, 5vw, 4rem);
  display: block;
  margin-bottom: 0.5rem;
  animation: fadeUp 0.9s 0.05s ease both;
}

.hero-desc {
  font-size: clamp(1rem, 2.5vw, 1.2rem);
  color: var(--muted);
  max-width: 560px;
  margin: 1.25rem auto 2.5rem;
  line-height: 1.7;
  animation: fadeUp 0.9s 0.2s ease both;
}

.hero-buttons {
  display: flex;
  flex-wrap: wrap;
  gap: 0.75rem;
  justify-content: center;
  animation: fadeUp 0.9s 0.3s ease both;
}

/* Particles */
.particles {
  position: absolute;
  inset: 0;
  z-index: 1;
  pointer-events: none;
  overflow: hidden;
}
.particle {
  position: absolute;
  border-radius: 50%;
  background: var(--green-light);
  opacity: 0;
  animation: floatParticle linear infinite;
}

/* Scroll indicator */
.scroll-hint {
  position: absolute;
  bottom: 2rem;
  left: 50%;
  transform: translateX(-50%);
  z-index: 2;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.4rem;
  color: var(--muted);
  font-size: 0.75rem;
  animation: fadeUp 1s 0.8s ease both;
}
.scroll-hint-line {
  width: 1.5px;
  height: 40px;
  background: linear-gradient(to bottom, transparent, var(--green-light));
  animation: scrollLine 1.8s ease-in-out infinite;
}

/* =============================================
   SECTION BASE
   ============================================= */
section { position: relative; }

.section-inner {
  max-width: 1180px;
  margin: 0 auto;
  padding: 6rem 2rem;
}

.section-eyebrow {
  display: inline-block;
  font-size: 0.72rem;
  font-weight: 700;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--green-light);
  margin-bottom: 0.75rem;
}

.section-title {
  font-family: 'Cinzel', serif;
  font-weight: 700;
  font-size: clamp(1.8rem, 4vw, 3rem);
  color: var(--white);
  line-height: 1.15;
  margin-bottom: 1rem;
}

.section-subtitle {
  font-size: 1.05rem;
  color: var(--muted);
  max-width: 520px;
  line-height: 1.7;
}

/* =============================================
   GLASS CARD
   ============================================= */
.glass-card {
  background: var(--glass-bg);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-md);
  backdrop-filter: blur(20px) saturate(1.3);
  -webkit-backdrop-filter: blur(20px) saturate(1.3);
  transition: transform var(--transition), box-shadow var(--transition), border-color var(--transition);
}
.glass-card:hover {
  transform: translateY(-5px);
  box-shadow: 0 20px 60px rgba(0,0,0,0.4), 0 0 0 1px rgba(102,187,106,0.2);
  border-color: rgba(102, 187, 106, 0.25);
}

/* =============================================
   SECTION: ABOUT
   ============================================= */
#about {
  background: linear-gradient(180deg, var(--black) 0%, var(--deep) 100%);
}

.about-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 1.25rem;
  margin-top: 3.5rem;
}

.about-card {
  padding: 2rem 1.75rem;
  display: flex;
  flex-direction: column;
  gap: 0.75rem;
}

.about-card-icon {
  font-size: 2.2rem;
  width: 56px; height: 56px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, rgba(46,125,50,0.2) 0%, rgba(102,187,106,0.1) 100%);
  border: 1px solid rgba(102,187,106,0.2);
  border-radius: var(--radius-sm);
  margin-bottom: 0.25rem;
  transition: box-shadow var(--transition);
}
.about-card:hover .about-card-icon {
  box-shadow: 0 0 20px rgba(102,187,106,0.25);
}

.about-card h3 {
  font-size: 1.05rem;
  font-weight: 600;
  color: var(--white);
}

.about-card p {
  font-size: 0.9rem;
  color: var(--muted);
  line-height: 1.65;
}

/* =============================================
   SECTION: WHY VANILLA PRIME
   ============================================= */
#why {
  background: var(--deep);
  overflow: hidden;
}

#why::before {
  content: '';
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 800px; height: 800px;
  border-radius: 50%;
  background: radial-gradient(ellipse, rgba(46,125,50,0.06) 0%, transparent 70%);
  pointer-events: none;
}

.why-layout {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 5rem;
  align-items: center;
}

.why-cards {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1rem;
}

.why-card {
  padding: 1.5rem;
  border-radius: var(--radius-md);
  background: rgba(20, 35, 20, 0.6);
  border: 1px solid var(--glass-border);
  backdrop-filter: blur(12px);
  transition: transform var(--transition), border-color var(--transition), box-shadow var(--transition);
}
.why-card:hover {
  transform: translateY(-4px);
  border-color: rgba(102,187,106,0.3);
  box-shadow: 0 12px 40px rgba(0,0,0,0.3);
}
.why-card-icon { font-size: 1.8rem; margin-bottom: 0.6rem; }
.why-card h4 { font-size: 0.92rem; font-weight: 600; color: var(--white); margin-bottom: 0.35rem; }
.why-card p { font-size: 0.82rem; color: var(--muted); line-height: 1.55; }

.why-text { padding-right: 1rem; }
.why-text .section-subtitle { max-width: 100%; }
.why-stat-row {
  display: flex;
  gap: 2rem;
  margin-top: 2.5rem;
}
.why-stat h3 {
  font-family: 'Cinzel', serif;
  font-size: 2.2rem;
  font-weight: 900;
  color: var(--green-light);
  line-height: 1;
}
.why-stat p { font-size: 0.8rem; color: var(--muted); margin-top: 0.3rem; }

/* =============================================
   SECTION: NEWS
   ============================================= */
#news { background: linear-gradient(180deg, var(--deep) 0%, var(--black) 100%); }

.news-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
  gap: 1.5rem;
  margin-top: 3.5rem;
}

.news-card {
  padding: 0;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  cursor: pointer;
}

.news-card-thumb {
  height: 180px;
  position: relative;
  overflow: hidden;
  background: linear-gradient(135deg, #1a2e1a 0%, #0f1f0f 100%);
  display: flex;
  align-items: center;
  justify-content: center;
}

.news-card-thumb .thumb-icon { font-size: 4rem; opacity: 0.6; transition: transform var(--transition), opacity var(--transition); }
.news-card:hover .thumb-icon { transform: scale(1.15); opacity: 0.85; }

.news-card-thumb::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 60px;
  background: linear-gradient(to bottom, transparent, rgba(13,20,13,0.9));
}

.news-card-body { padding: 1.5rem; flex: 1; display: flex; flex-direction: column; gap: 0.6rem; }
.news-date {
  font-size: 0.75rem;
  font-weight: 600;
  color: var(--green-light);
  letter-spacing: 0.1em;
  text-transform: uppercase;
}
.news-title {
  font-size: 1.05rem;
  font-weight: 700;
  color: var(--white);
  line-height: 1.35;
}
.news-desc { font-size: 0.87rem; color: var(--muted); line-height: 1.6; flex: 1; }
.news-card-body .btn { margin-top: auto; align-self: flex-start; }

/* =============================================
   SECTION: TIMELINE / UPDATES
   ============================================= */
#updates { background: var(--deep); }

.timeline {
  position: relative;
  margin-top: 4rem;
  max-width: 780px;
}

.timeline::before {
  content: '';
  position: absolute;
  left: 23px;
  top: 0; bottom: 0;
  width: 2px;
  background: linear-gradient(to bottom, var(--green-dark), rgba(46,125,50,0.1));
}

.timeline-item {
  display: flex;
  gap: 2rem;
  margin-bottom: 1rem;
  position: relative;
}

.timeline-dot {
  flex-shrink: 0;
  width: 48px; height: 48px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--green-dark), var(--green));
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Cinzel', serif;
  font-weight: 700;
  font-size: 0.65rem;
  color: var(--white);
  border: 2px solid var(--green-dark);
  box-shadow: 0 0 0 4px rgba(46,125,50,0.1);
  cursor: pointer;
  transition: box-shadow var(--transition), transform var(--transition);
  z-index: 1;
}
.timeline-dot:hover,
.timeline-item.active .timeline-dot {
  box-shadow: 0 0 0 6px rgba(46,125,50,0.2), 0 0 20px rgba(102,187,106,0.3);
  transform: scale(1.08);
}

.timeline-content { flex: 1; padding-bottom: 1rem; }

.timeline-header {
  display: flex;
  align-items: center;
  gap: 1rem;
  padding: 1.1rem 1.5rem;
  background: rgba(20, 35, 20, 0.6);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-md);
  cursor: pointer;
  transition: border-color var(--transition), background var(--transition);
  backdrop-filter: blur(12px);
}
.timeline-header:hover,
.timeline-item.active .timeline-header {
  border-color: rgba(102,187,106,0.3);
  background: rgba(25, 42, 25, 0.75);
}

.timeline-version {
  font-family: 'Cinzel', serif;
  font-weight: 700;
  font-size: 1rem;
  color: var(--green-light);
}
.timeline-title { font-weight: 600; color: var(--white); font-size: 0.95rem; flex: 1; }
.timeline-chevron {
  width: 20px; height: 20px;
  color: var(--muted);
  transition: transform var(--transition), color var(--transition);
  flex-shrink: 0;
}
.timeline-item.active .timeline-chevron { transform: rotate(180deg); color: var(--green-light); }

.timeline-body {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.45s cubic-bezier(0.4, 0, 0.2, 1);
}
.timeline-item.active .timeline-body { max-height: 400px; }
.timeline-body-inner {
  padding: 1.25rem 1.5rem 0.5rem;
  background: rgba(15, 24, 15, 0.7);
  border: 1px solid var(--glass-border);
  border-top: none;
  border-radius: 0 0 var(--radius-md) var(--radius-md);
  backdrop-filter: blur(12px);
}
.timeline-body-inner ul {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
  margin: 0;
  padding: 0 0 0.75rem;
}
.timeline-body-inner li {
  font-size: 0.875rem;
  color: var(--text);
  display: flex;
  align-items: flex-start;
  gap: 0.6rem;
  line-height: 1.55;
}
.timeline-body-inner li::before {
  content: '▸';
  color: var(--green-light);
  flex-shrink: 0;
  margin-top: 0.05rem;
}

/* =============================================
   SECTION: DONATE
   ============================================= */
#donate {
  background: linear-gradient(180deg, var(--deep) 0%, var(--black) 100%);
  overflow: hidden;
}

#donate::before {
  content: '';
  position: absolute;
  top: -200px; left: 50%;
  transform: translateX(-50%);
  width: 1200px; height: 600px;
  background: radial-gradient(ellipse, rgba(46,125,50,0.07) 0%, transparent 65%);
  pointer-events: none;
}

.donate-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 1.25rem;
  margin-top: 3.5rem;
  align-items: end;
}

.donate-card {
  padding: 2rem 1.75rem;
  display: flex;
  flex-direction: column;
  gap: 1rem;
  position: relative;
  overflow: hidden;
}

.donate-card.popular {
  border-color: rgba(102,187,106,0.4) !important;
  box-shadow: 0 0 0 1px rgba(102,187,106,0.15), 0 20px 60px rgba(0,0,0,0.3);
  transform: translateY(-8px);
}
.donate-card.popular:hover { transform: translateY(-13px); }

.donate-badge {
  position: absolute;
  top: 1rem; right: 1rem;
  background: linear-gradient(135deg, var(--green-dark), var(--green));
  color: var(--white);
  font-size: 0.68rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 0.25rem 0.65rem;
  border-radius: 50px;
}

.donate-icon { font-size: 2.4rem; }
.donate-tier {
  font-family: 'Cinzel', serif;
  font-size: 1.35rem;
  font-weight: 700;
  color: var(--white);
}
.donate-price {
  font-size: 2.2rem;
  font-weight: 800;
